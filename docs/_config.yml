title: Git & GitHub Learning Hub
subtitle: Master Git from first commit to advanced workflows
description: A comprehensive guide to mastering Git and GitHub — from first commit to advanced workflows
remote_theme: mmistakes/minimal-mistakes

url: "https://shubhu-io.github.io"
baseurl: "/git-github-practice"

repository: shubhu-io/git-github-practice

minimal_mistakes_skin: "dark"

search: true
search_full_content: true

teaser: /assets/images/500x300.png

include:
  - _pages

breadcrumbs: true

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false
      sidebar:
        nav: "docs"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/shubhu-io/git-github-practice"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

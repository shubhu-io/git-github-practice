<div id="theme-picker-wrapper" style="position:fixed;bottom:1rem;right:1rem;z-index:999;display:flex;flex-direction:column;align-items:flex-end;gap:.5rem">
  <div id="theme-panel" style="display:none;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:.75rem;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:background-color .3s,border-color .3s">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">
      <button class="theme-btn" data-theme="light" title="Light" style="background:#fff;color:#333;border:2px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:transform .15s;display:flex;align-items:center;gap:.3rem">☀️ Light</button>
      <button class="theme-btn" data-theme="dark" title="Dark" style="background:#1a1a2e;color:#e0e0e0;border:2px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:transform .15s;display:flex;align-items:center;gap:.3rem">🌙 Dark</button>
      <button class="theme-btn" data-theme="night" title="Night" style="background:#0d0d0d;color:#d0d0d0;border:2px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:transform .15s;display:flex;align-items:center;gap:.3rem">🌌 Night</button>
      <button class="theme-btn" data-theme="sepia" title="Sepia" style="background:#f4ecd8;color:#5b4636;border:2px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:transform .15s;display:flex;align-items:center;gap:.3rem">📜 Sepia</button>
      <button class="theme-btn" data-theme="forest" title="Forest" style="background:#1a2e1a;color:#c8dcc8;border:2px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:transform .15s;display:flex;align-items:center;gap:.3rem">🌲 Forest</button>
      <button class="theme-btn" data-theme="ocean" title="Ocean" style="background:#0a1628;color:#c8d8e8;border:2px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;font-size:.75rem;font-weight:600;transition:transform .15s;display:flex;align-items:center;gap:.3rem">🌊 Ocean</button>
    </div>
  </div>
  <button id="theme-toggle-btn" aria-label="Switch theme" title="Switch theme" style="width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .2s,background-color .3s,border-color .3s;position:relative">🎨</button>
</div>

<script>
(function() {
  var panel = document.getElementById('theme-panel');
  var toggleBtn = document.getElementById('theme-toggle-btn');
  var themeBtns = document.querySelectorAll('.theme-btn');
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var currentTheme = saved || (prefersDark ? 'dark' : 'light');

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    currentTheme = t;
    themeBtns.forEach(function(btn) {
      if (btn.getAttribute('data-theme') === t) {
        btn.style.outline = '2px solid var(--link)';
        btn.style.outlineOffset = '1px';
      } else {
        btn.style.outline = 'none';
      }
    });
  }

  applyTheme(currentTheme);

  toggleBtn.addEventListener('click', function() {
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });

  themeBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      applyTheme(this.getAttribute('data-theme'));
      panel.style.display = 'none';
    });
    btn.addEventListener('mouseenter', function() {
      this.style.transform = 'scale(1.05)';
    });
    btn.addEventListener('mouseleave', function() {
      this.style.transform = 'scale(1)';
    });
  });

  document.addEventListener('click', function(e) {
    if (!document.getElementById('theme-picker-wrapper').contains(e.target)) {
      panel.style.display = 'none';
    }
  });
})();
</script>

<style>
:root {
  --bg: #fff;
  --text: #333;
  --link: #2a7ae2;
  --border: #e8e8e8;
  --sidebar-bg: #f5f5f5;
  --masthead-bg: #fafafa;
  --code-bg: #f0f0f0;
  --blockquote-bg: #f9f9f9;
  --blockquote-border: #ccc;
  --toc-bg: #f9f9f9;
  --search-bg: #f5f5f5;
  --search-border: #ccc;
}

[data-theme="dark"] {
  --bg: #1a1a2e;
  --text: #e0e0e0;
  --link: #7ec8e3;
  --border: #333;
  --sidebar-bg: #16213e;
  --masthead-bg: #0f3460;
  --code-bg: #2a2a4a;
  --blockquote-bg: #1a1a3e;
  --blockquote-border: #555;
  --toc-bg: #16213e;
  --search-bg: #16213e;
  --search-border: #444;
}

body {
  background-color: var(--bg);
  color: var(--text);
  transition: background-color .3s, color .3s;
}

a, a:visited { color: var(--link); }
.masthead, .greedy-nav { background-color: var(--masthead-bg) !important; }
.sidebar { background-color: var(--sidebar-bg) !important; }
.page__footer { background-color: var(--masthead-bg) !important; border-top-color: var(--border); }
td, th, hr, .author__urls-wrapper button, blockquote { border-color: var(--border) !important; }
div.highlighter-rouge, figure.highlight { background: var(--code-bg) !important; }
blockquote { background: var(--blockquote-bg) !important; border-left-color: var(--blockquote-border) !important; }
.search-wrapper { background-color: var(--search-bg) !important; border-color: var(--search-border) !important; }
.search-content .search-input { background-color: var(--search-bg) !important; color: var(--text) !important; }
.page__content p, .page__content li, .page__content dt { color: var(--text); }
h1, h2, h3, h4, h5, h6 { color: var(--text); }
.nav__list .nav__items a { color: var(--text); }
.nav__list .nav__items a:hover { color: var(--link); }
.toc { background-color: var(--toc-bg) !important; border-color: var(--border) !important; }
</style>

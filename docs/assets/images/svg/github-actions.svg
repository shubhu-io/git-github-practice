<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <style>
    .node { font-family: 'Segoe UI', sans-serif; font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; fill: #1e293b; }
    .label { fill: #fff; font-weight: 500; }
    .cmd { fill: #6366f1; font-family: monospace; font-size: 11px; }
  </style>
  <text x="400" y="25" text-anchor="middle" class="title">GitHub Actions Workflow</text>
  <rect x="50" y="60" width="150" height="50" rx="8" fill="#10b981"/>
  <text x="125" y="90" text-anchor="middle" class="label">Trigger</text>
  <rect x="250" y="60" width="150" height="50" rx="8" fill="#6366f1"/>
  <text x="325" y="90" text-anchor="middle" class="label">Checkout</text>
  <rect x="450" y="60" width="150" height="50" rx="8" fill="#f59e0b"/>
  <text x="525" y="90" text-anchor="middle" class="label">Build & Test</text>
  <rect x="650" y="60" width="150" height="50" rx="8" fill="#ec4899"/>
  <text x="725" y="90" text-anchor="middle" class="label">Deploy</text>
  <line x1="200" y1="85" x2="245" y2="85" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="85" x2="445" y2="85" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="85" x2="645" y2="85" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/></marker></defs>
  <g transform="translate(50, 140)">
    <rect width="700" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="350" y="25" text-anchor="middle" class="node" style="font-weight:bold; font-size:14px">Example Workflow YAML</text>
    <text x="15" y="50" class="cmd">name: CI</text>
    <text x="15" y="68" class="cmd">on: [push, pull_request]</text>
    <text x="15" y="86" class="cmd">jobs:</text>
    <text x="30" y="104" class="cmd">build:</text>
    <text x="45" y="122" class="cmd">runs-on: ubuntu-latest</text>
    <text x="45" y="140" class="cmd">steps:</text>
    <text x="60" y="158" class="cmd">- uses: actions/checkout@v4</text>
    <text x="60" y="176" class="cmd">- run: npm ci && npm test</text>
    <text x="60" y="194" class="cmd">- run: npm run build</text>
  </g>
</svg>
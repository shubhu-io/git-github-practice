<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>404 — Page Not Found | Git & GitHub Learning Hub</title>
  <meta name="theme-color" content="#0D1117">
  <link rel="stylesheet" href="./assets/css/main.css">
  <script>(function(){var t=localStorage.getItem('gh-learning-theme');var auto=localStorage.getItem('gh-learning-theme-auto');if(auto==='true'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}else if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})();</script>
  <style>
    .error-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .error-content { text-align:center; max-width:480px; }
    .error-code { font-family:var(--ff-mono); font-size:6rem; font-weight:800; color:var(--clr-primary); line-height:1; margin-bottom:1rem; }
    .error-title { font-family:var(--ff-display); font-size:1.5rem; font-weight:700; color:var(--clr-text); margin-bottom:0.75rem; }
    .error-text { color:var(--clr-text-secondary); margin-bottom:2rem; line-height:1.6; }
    .error-actions { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content fade-up visible">
      <div class="error-code">404</div>
      <div class="error-title">Page Not Found</div>
      <div class="error-text">
        This commit doesn't exist in our repository.<br>
        The page you're looking for was either moved, deleted, or never committed.
      </div>
      <div class="error-actions">
        <a href="./" class="btn btn-primary btn-lg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Go Home
        </a>
        <a href="./Master-Index.html" class="btn btn-secondary btn-lg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          Master Index
        </a>
      </div>
      <div style="margin-top:3rem;">
        <div class="terminal" style="text-align:left;">
          <div class="terminal-header"><span class="terminal-dot red"></span><span class="terminal-dot yellow"></span><span class="terminal-dot green"></span><span class="terminal-title">error</span></div>
          <div class="terminal-body">
            <span class="terminal-prompt">$</span> <span class="terminal-command">git checkout page-not-found</span><br>
            <span class="terminal-output" style="color:var(--clr-danger);">error: pathspec 'page-not-found' did not match any file(s) known to git.</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="./assets/js/theme.js"></script>
</body>
</html>
